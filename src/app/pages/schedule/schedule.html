<div class="schedule-container">
  <h2>Ditt ramschema</h2>

  <p *ngIf="schedule.length === 0">Inga kurser tillagda ännu.</p>

  <table *ngIf="schedule.length > 0">
    <thead>
      <tr>
        <th>Kurskod</th>
        <th>Kursnamn</th>
        <th>Ämne</th>
        <th>Poäng</th>
        <th>Ta bort</th>
      </tr>
    </thead>
    <tbody>
      <tr *ngFor="let course of schedule">
        <td data-label="Kurskod">{{ course.courseCode }}</td>
        <td data-label="Kursnamn">{{ course.courseName }}</td>
        <td data-label="Ämne">{{ course.subject }}</td>
        <td data-label="Poäng">{{ course.points }}</td>
        <td><button (click)="removeCourse(course)">Ta bort</button></td>
      </tr>
    </tbody>
  </table>

  <p *ngIf="schedule.length > 0">Totalt högskolepoäng: {{ totalPoints() }}</p>
</div>
