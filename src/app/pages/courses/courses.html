<div class="courses-container">
  <h2>Kurser</h2>

  <div class="search-bar">
    <input type="text" [(ngModel)]="searchTerm" placeholder="Filtrera kurser..." (input)="searchCourses()" />

    <select [(ngModel)]="selectedSubject" (change)="searchCourses()">
      <option value="">Alla ämnen</option>
      <option *ngFor="let subject of subjects" [value]="subject">
        {{ subject }}
      </option>
    </select>

    <button (click)="searchCourses()">Sök</button>
  </div>

  <p class="result-info">
    Visar {{ paginatedCourses.length }} av {{ filteredCourses.length }} kurser
  </p>

  <div class="table-wrapper">
    <table class="table">
      <thead>
        <tr>
          <th class="click-title" (click)="sortBy('courseCode')">Kurskod</th>
          <th class="click-title" (click)="sortBy('courseName')">Kursnamn</th>
          <th class="click-title" (click)="sortBy('subject')">Ämne</th>
          <th class="click-title" (click)="sortBy('points')">Poäng</th>
          <th>Lägg till</th>
        </tr>
      </thead>
      <tbody>
        <tr *ngFor="let course of paginatedCourses">
          <td data-label="Kurskod">{{ course.courseCode }}</td>
          <td data-label="Kursnamn">{{ course.courseName }}</td>
          <td data-label="Ämne">{{ course.subject }}</td>
          <td data-label="Poäng">{{ course.points }}</td>
          <td>
            <button (click)="addToSchedule(course)">Lägg till</button>
          </td>
        </tr>
      </tbody>
    </table>
  </div>

  <div class="pagination" *ngIf="filteredCourses.length > 0">
    <button (click)="previousPage()" [disabled]="currentPage === 1">
      Föregående
    </button>

    <span>Sida {{ currentPage }} av {{ totalPages }}</span>

    <button (click)="nextPage()" [disabled]="currentPage === totalPages">
      Nästa
    </button>
  </div>
</div>
